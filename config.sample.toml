[paths]
data_dir = "data"
output_dir = "outputs"
logs_dir = "data/logs"
db_path = "data/jobs.db"

[app]
refresh_seconds = 2

[ocr]
method = "hf"
safe_mode = true
batch_size = 1
max_parallel_jobs = 1
include_images = true
include_headers_footers = false
page_range = ""
max_output_tokens = 12384
offline_mode = true
model_checkpoint = "datalab-to/chandra-ocr-2"
local_model_path = "models/chandra-ocr-2"

